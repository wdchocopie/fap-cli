name: tests

# Chạy 2 bộ test OFFLINE (50 unit + 79 integration) mỗi khi push / mở PR.
# KHÔNG cần token FAP, KHÔNG gọi mạng — mọi lời gọi API đều được mock.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:        # cho phép bấm chạy tay trên tab Actions

jobs:
  offline-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false      # 1 phiên bản Python fail không chặn các phiên bản khác
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (+ requests)
        run: python -m pip install -e .

      - name: Compile check
        run: python -m compileall fapc tests

      - name: Unit tests (offline)
        run: python tests/test_logic.py

      - name: Integration tests (offline)
        run: python tests/integration_offline.py
